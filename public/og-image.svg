    </g>
    <g transform="translate(930 196) rotate(-6)">
      <rect width="196" height="278" rx="18" fill="#fffdf4" stroke="#20140f" stroke-width="5" />
      <path d="M98 58a36 36 0 0 1 31.6 53.4A37 37 0 1 1 107 170l9 29H73l9-29a37 37 0 1 1-22.6-58.6A36 36 0 0 1 98 58Z" fill="#b3123a" />
      <text x="24" y="44" fill="#b3123a" font-family="Georgia, serif" font-size="36" font-weight="700">10</text>
    </g>
  </g>

  <text x="96" y="238" fill="#f3de33" font-family="Verdana, Geneva, sans-serif" font-size="120" font-weight="800" style="letter-spacing:-2px">Prefa</text>
  <text x="102" y="308" fill="#fffdf4" font-family="Verdana, Geneva, sans-serif" font-size="42" font-weight="700">preferans online u troje</text>
  <text x="102" y="366" fill="#d7efe0" font-family="Verdana, Geneva, sans-serif" font-size="27" font-weight="600">Srpska pravila · mobilni sto · besplatno</text>

